<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>لعبة العدالة</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #1e1912;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .vintage-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(60, 45, 30, 0.12) 0px, rgba(60, 45, 30, 0.12) 1px, transparent 1px, transparent 6px),
                radial-gradient(circle at 15% 40%, rgba(0,0,0,0.08) 1px, transparent 1px);
            background-size: 10px 10px, 25px 25px;
            background-color: #cbbd96;
            pointer-events: none;
            z-index: -2;
        }
        
        .vintage-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .vintage-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4), inset 0 0 0 3px #d6be8a, inset 0 0 0 8px #5a3f28;
            pointer-events: none;
        }

        .game-container {
            width: 1350px;
            max-width: 96vw;
            background: rgba(215, 190, 145, 0.92);
            backdrop-filter: blur(2px);
            border: 12px double #2a2015;
            border-radius: 20px;
            box-shadow: 20px 20px 0px 0px #17120b, inset 0 0 30px rgba(0,0,0,0.2);
            padding: 30px 28px;
            position: relative;
            transition: all 0.2s;
        }

        .game-container::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid #a3875a;
            pointer-events: none;
            border-radius: 12px;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
            filter: drop-shadow(3px 3px 0px #2a1f12);
        }
        .logo img {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            max-width: 140px;
            width: 35%;
            border-radius: 12px;
        }

        .main-headline {
            text-align: center;
            margin: 20px auto 30px;
        }
        .main-headline h1 {
            font-size: 24px;
            color: #f7eedb;
            background: #2c2118cc;
            display: inline-block;
            padding: 10px 28px;
            letter-spacing: 3px;
            border-left: 5px solid #8b3c1c;
            border-right: 5px solid #8b3c1c;
            font-weight: bold;
            backdrop-filter: blur(2px);
            font-family: 'Tajawal', sans-serif;
            text-shadow: 1px 1px 0 #4a3720;
        }

        .pixel-btn {
            background: transparent;
            border: none;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .pixel-btn img {
            width: 100%;
            max-width: 200px;
            image-rendering: crisp-edges;
            filter: drop-shadow(5px 5px 0px #1f160c);
            transition: 0.05s linear;
        }
        .pixel-btn:hover img {
            transform: scale(1.02);
            filter: drop-shadow(3px 3px 0px #1f160c);
        }
        .pixel-btn:active img {
            transform: translate(2px, 2px);
            filter: drop-shadow(1px 1px 0px #1f160c);
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 35px 0 35px;
        }

        footer {
            text-align: center;
            margin-top: 45px;
            font-size: 15px;
            color: #2c2218;
            border-top: 3px solid #7b623c;
            padding-top: 22px;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
        }

        .page {
            display: none;
            animation: fadeInUp 0.25s steps(4);
        }
        .active-page {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .cases-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }
        .case-card {
            background: #dfceaa;
            border: 6px solid #342618;
            width: 300px;
            padding: 18px;
            text-align: center;
            box-shadow: 12px 12px 0 #2f1f0e;
            transition: 0.08s linear;
            cursor: pointer;
            border-radius: 16px;
        }
        .case-card.unavailable {
            opacity: 0.5;
            filter: grayscale(0.3);
            cursor: default;
            box-shadow: 6px 6px 0 #2f1f0e;
        }
        .case-card:hover:not(.unavailable) {
            transform: scale(1.02);
            background: #f1e3c2;
            box-shadow: 8px 8px 0 #2f1f0e;
        }
        .case-img {
            width: 100%;
            height: 170px;
            background: #6f4f2e;
            image-rendering: pixelated;
            object-fit: cover;
            border: 4px solid #241a0e;
            border-radius: 12px;
        }
        .badge {
            background: #6b2e1a;
            color: #f6e5c3;
            padding: 6px;
            font-size: 13px;
            margin: 8px 0;
            font-weight: bold;
        }
        .case-description {
            font-size: 14px;
            margin: 8px 0;
            color: #2c2419;
        }
        .case-date {
            font-size: 12px;
            color: #6f4a25;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .setup-panel {
            background: #dac191;
            padding: 30px;
            border: 5px solid #4f3a24;
            margin: 20px 0;
            border-radius: 20px;
            box-shadow: inset 0 0 0 2px #fcf0da, 10px 10px 0 #2c2115;
        }
        .slider-label {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #281f13;
            flex-wrap: wrap;
        }
        .counter-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2c1f12;
            padding: 8px 15px;
            border-radius: 60px;
            display: inline-flex;
            box-shadow: inset 0 0 0 2px #b6935a, 0 4px 8px rgba(0,0,0,0.2);
        }
        .counter-btn {
            background: #5a3f26;
            border: none;
            font-size: 32px;
            font-weight: bold;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            color: #f0dbb4;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            box-shadow: 3px 3px 0 #1f150a;
            transition: 0.05s linear;
        }
        .counter-btn:active {
            transform: translate(2px,2px);
            box-shadow: 1px 1px 0 #1f150a;
        }
        .counter-value {
            font-size: 36px;
            font-weight: bold;
            color: #f9e2b0;
            min-width: 60px;
            text-align: center;
            background: #1b140b;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
            gap: 28px;
            margin: 30px 0;
        }
        .input-field {
            background: #fef5e3;
            border: 4px solid #5e4228;
            padding: 14px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            width: 100%;
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.1);
            transition: all 0.1s;
            border-radius: 12px;
        }
        .input-field:focus {
            outline: none;
            border-color: #b87a3a;
            background: #fffaf0;
        }
        .label-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .card-flip-container {
            perspective: 1000px;
            width: 340px;
            height: 440px;
            margin: 25px auto;
            cursor: pointer;
        }
        .flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 8px solid #2d1f10;
            box-shadow: 12px 12px 0 #1f150a;
            border-radius: 28px;
        }
        .front {
            transform: rotateY(0deg);
            background: #b68f60;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .front span {
            font-size: 120px;
            font-weight: bold;
            color: #f2e0b0;
            text-shadow: 6px 6px 0 #5a3e20;
        }
        .back {
            transform: rotateY(180deg);
            background: #eedfbe;
            color: #1c150c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-size: 22px;
        }
        .flipped .flipper {
            transform: rotateY(180deg);
        }
        .role-desc {
            font-size: 17px;
            margin-top: 20px;
            padding: 10px;
            background: #c7aa78;
            border-radius: 12px;
            text-align: center;
            max-height: 250px;
            overflow-y: auto;
        }

        .player-name-badge {
            background: #ddc9a0;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            color: #2c2412;
            margin-bottom: 20px;
            border: 2px solid #5e3f24;
            box-shadow: inset 0 0 0 1px #fff1dc, 3px 3px 0 #392b1a;
        }

        .round-panel {
            background: #ceb27c;
            border: 8px solid #4f351d;
            padding: 28px;
            border-radius: 32px;
            box-shadow: inset 0 0 0 3px #f7e7ca, 12px 12px 0 #241b0e;
        }
        .timer-box {
            font-size: 64px;
            background: #241e12;
            color: #fdd68f;
            text-align: center;
            padding: 20px;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 8px;
            border-radius: 24px;
            margin-bottom: 25px;
        }
        .evidence-area {
            background: #b68447;
            min-height: 180px;
            padding: 20px;
            margin: 20px 0;
            border: 5px dashed #352613;
            border-radius: 20px;
        }
        .evidence-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .evidence-card {
            background: #281f12;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            border-right: 8px solid #c88a42;
        }
        .evidence-card img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #c88a42;
        }
        .evidence-card p {
            flex: 1;
            color: #f3e5cf;
            font-size: 15px;
            line-height: 1.4;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .material-symbols-outlined {
            font-size: 28px;
            vertical-align: middle;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .case-popup, .evidence-card-popup {
            background: #dac299;
            border: 6px solid #2b1f12;
            border-radius: 32px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeInUp 0.2s ease;
        }
        .case-popup img, .evidence-card-popup img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            display: block;
        }
        .case-popup p, .evidence-card-popup p {
            padding: 20px;
            font-size: 18px;
            color: #2d2418;
            font-weight: bold;
            line-height: 1.5;
        }
        .case-popup button, .evidence-card-popup button {
            background: #32271c;
            border: none;
            padding: 12px 24px;
            font-size: 20px;
            color: #ecd9b4;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            margin: 0 20px 20px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            z-index: 1150;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .countdown-number {
            font-size: 80px;
            font-weight: bold;
            color: #f9e2b0;
            text-shadow: 0 0 20px #000;
            background: #1b140bcc;
            padding: 20px 40px;
            border-radius: 60px;
            font-family: monospace;
        }
        .skip-btn {
            background: #32271c;
            border: none;
            padding: 10px 24px;
            font-size: 18px;
            color: #f2e2c0;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        .unified-btn {
            background: #32271c;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: #f2e2c0;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 5px 5px 0 #120e07;
            transition: 0.05s linear;
        }
        .unified-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #120e07;
        }
        .buttons-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .buttons-left {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        .buttons-right {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .cases-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .cases-header h2 {
            margin: 0;
            order: 2;
        }
        .cases-header .unified-btn {
            order: 1;
        }
        .simple-solution {
            background: #1e1912;
            padding: 20px;
            text-align: center;
        }
        .simple-solution img {
            max-width: 85%;
            border-radius: 20px;
            margin: 20px auto;
            transform: scale(1.05);
            display: block;
        }
        .simple-solution p {
            color: #f2e2c0;
            font-size: 18px;
            line-height: 1.6;
            background: #2c2418;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
        }
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1200;
            justify-content: center;
            align-items: center;
        }
        .custom-modal .modal-content {
            background: #dac299;
            border: 8px double #2b1f12;
            padding: 30px;
            max-width: 400px;
            width: 85%;
            text-align: center;
            border-radius: 32px;
        }

        @media (max-width: 760px) {
            .btn-row { gap: 15px; }
            .pixel-btn img { max-width: 150px; }
            .timer-box { font-size: 42px; }
            .counter-btn { width: 40px; height: 40px; font-size: 28px; }
            .counter-value { font-size: 28px; min-width: 50px; }
            .main-headline h1 { font-size: 22px; }
            .logo img { max-width: 110px; }
            .front span { font-size: 80px; }
            .buttons-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .buttons-left, .buttons-right {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="vintage-bg"></div>
<div class="game-container" id="gameApp">

    <div id="homePage" class="page active-page">
        <div class="logo">
            <img src="https://i.postimg.cc/MTCfhx6y/Whats-App-Image-2026-05-30-at-2-18-30-PM-Photoroom.png" alt="Logo العدالة">
        </div>
        <div class="main-headline">
            <h1>#العدالة تأخذ مجراها</h1>
        </div>
        <div class="btn-row">
            <button class="pixel-btn" id="startCasesBtn"><img src="https://i.postimg.cc/15CstBFf/Whats-App-Image-2026-05-30-at-1-27-03-PM-Photoroom.png" alt="يلا بينا!"></button>
            <button class="pixel-btn" id="howToPlayBtn"><img src="https://i.postimg.cc/PxwPbcmg/Whats-App-Image-2026-05-30-at-1-27-03-PM-(1)-Photoroom.png" alt="بتتلعب أزاي؟"></button>
            <button class="pixel-btn" id="onlineBtn"><img src="https://i.postimg.cc/50C65GBd/Whats-App-Image-2026-05-30-at-1-27-03-PM-(2)-Photoroom.png" alt="أون لاين"></button>
        </div>
        <footer>جميع الحقوق محفوظة MOTC 2026</footer>
    </div>

    <div id="casesPage" class="page">
        <div class="cases-header">
            <h2><span class="material-symbols-outlined">inventory_2</span> ملفات القضايا</h2>
            <button class="unified-btn" id="backToHomeFromCases">ارجع كدة</button>
        </div>
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <div id="setupPage" class="page">
        <div class="setup-panel">
            <div class="slider-label"><span class="material-symbols-outlined">groups</span> عدد اللاعبين:</div>
            <div class="counter-control">
                <button class="counter-btn" id="decPlayers">-</button>
                <span class="counter-value" id="playerCountVal">4</span>
                <button class="counter-btn" id="incPlayers">+</button>
            </div>
            <div class="slider-label" style="margin-top: 20px;"><span class="material-symbols-outlined">hourglass_top</span> مدة الجولة (دقايق):</div>
            <div class="counter-control">
                <button class="counter-btn" id="decTime">-</button>
                <span class="counter-value" id="roundTimeVal">4</span>
                <button class="counter-btn" id="incTime">+</button>
            </div>
        </div>
        <div class="buttons-wrapper">
            <div class="buttons-right">
                <button class="unified-btn" id="backToCasesFromSetup">ارجع كدة</button>
            </div>
            <div class="buttons-left">
                <button class="unified-btn" id="nextToNames">اللي بعده</button>
            </div>
        </div>
    </div>

    <div id="namesPage" class="page">
        <h3><span class="material-symbols-outlined">edit_note</span> تسجيل أسماء اللاعبين</h3>
        <div id="namesInputsContainer" class="names-grid"></div>
        <div class="buttons-wrapper">
            <div class="buttons-right">
                <button class="unified-btn" id="backToSetupFromNames">ارجع كدة</button>
            </div>
            <div class="buttons-left">
                <button class="unified-btn" id="confirmNamesBtn">تمام</button>
            </div>
        </div>
    </div>

    <div id="roleRevealPage" class="page">
        <div id="revealPlayerName" class="player-name-badge"></div>
        <div class="card-flip-container" id="flipCardContainer">
            <div class="flipper" id="flipperEl">
                <div class="front"><span>?</span></div>
                <div class="back" id="roleBackContent">
                    <div id="roleTitle" style="font-size:28px; font-weight:bold; margin-bottom:15px;"></div>
                    <div id="roleDesc" class="role-desc"></div>
                </div>
            </div>
        </div>
        <div class="buttons-wrapper">
            <div class="buttons-right">
                <button class="unified-btn" id="backToNamesFromRoles">ارجع كدة</button>
            </div>
            <div class="buttons-left">
                <button class="unified-btn" id="nextPlayerBtn">اللي بعده</button>
            </div>
        </div>
    </div>

    <div id="gameplayPage" class="page">
        <div class="round-panel">
            <div class="timer-box" id="timerDisplay">00:00</div>
            <div class="flex-between">
                <span id="roundLabel" style="font-size:28px; font-weight:bold;">الجولة الأولى</span>
                <button class="unified-btn" id="forceNextEvidenceBtn">التالي</button>
            </div>
            <div class="evidence-area">
                <div class="evidence-list" id="evidenceList"></div>
            </div>
        </div>
        <div class="buttons-wrapper">
            <div class="buttons-right">
                <button class="unified-btn" id="backToHomeFromGameplay">ارجع كدة</button>
            </div>
            <div class="buttons-left">

        function assignCharactersAndSecretRoles(players) { let n = players.length; let shuffledChars = [...caseCharacters]; for(let i = shuffledChars.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [shuffledChars[i], shuffledChars[j]] = [shuffledChars[j], shuffledChars[i]]; } let assignedChars = []; for(let i = 0; i < n; i++){ let char = { ...shuffledChars[i % shuffledChars.length] }; if(i >= shuffledChars.length) char.name = char.name + " " + (Math.floor(i/shuffledChars.length)+1); assignedChars.push(char); } let secretRoles = new Array(n).fill('محقق'); let strangerIdx = Math.floor(Math.random() * n); secretRoles[strangerIdx] = 'غريب'; let criminalIdx; do { criminalIdx = Math.floor(Math.random() * n); } while(criminalIdx === strangerIdx); secretRoles[criminalIdx] = 'مجرم'; let randomMission = strangerMissionsList[Math.floor(Math.random() * strangerMissionsList.length)]; return { characters: assignedChars, secretRoles, strangerIdx, criminalIdx, strangerMission: randomMission }; }

        function formatTimer(sec) { let mins = Math.floor(sec/60); let remain = sec % 60; return `${mins.toString().padStart(2,'0')}:${remain.toString().padStart(2,'0')}`; }

        function showEvidenceCard(evIndex) { if(isShowingEvidence || evIndex >= gameState.evidences.length) return; isShowingEvidence = true; let ev = gameState.evidences[evIndex]; let popupDiv = document.createElement('div'); popupDiv.className = 'overlay'; popupDiv.innerHTML = `<div class="evidence-card-popup"><img src="${ev.img}" alt="دليل"><p>${ev.text}</p><button id="confirmEvidenceBtn">تمام</button></div>`; document.body.appendChild(popupDiv); document.getElementById('confirmEvidenceBtn').onclick = () => { popupDiv.remove(); addEvidenceToLog(evIndex); gameState.nextEvidenceToShow = evIndex + 1; isShowingEvidence = false; showNextEvidenceFromQueue(); }; }
        function forceShowNextEvidence() { if(isShowingEvidence || !gameState.gameplayActive || gameState.finalTimerFlag) return; let expectedStart = (gameState.activeRound === 0) ? 0 : (gameState.activeRound === 1 ? 2 : 4); let maxInRound = gameState.roundEvidencesMax[gameState.activeRound]; if(gameState.nextEvidenceToShow < expectedStart) gameState.nextEvidenceToShow = expectedStart; if(gameState.nextEvidenceToShow >= expectedStart + maxInRound) return; showEvidenceCard(gameState.nextEvidenceToShow); }
        function startRoleReveal(playersList, charactersList, secretRolesList, strangerIdx, criminalIdx, strangerMission) { currentPlayers = [...playersList]; currentRolesList = [...secretRolesList]; currentCharactersList = [...charactersList]; gameState.strangerIndex = strangerIdx; gameState.criminalIndex = criminalIdx; gameState.strangerMission = strangerMission; gameState.currentRevealIdx = 0; showPage('roleRevealPage'); updateRevealScreen(0); }
        function updateRevealScreen(idx) { if(idx >= currentPlayers.length) { showCasePopup(); return; } let name = currentPlayers[idx]; let character = currentCharactersList[idx]; let secretRole = currentRolesList[idx]; document.getElementById('revealPlayerName').innerHTML = `<span class="material-symbols-outlined">person</span> اللاعب: ${name}`; let displayTitle = `شخصيتك: ${character.name}`; let displayDesc = character.desc; if(secretRole === 'مجرم') { displayDesc += "\n\n🔴 أنت المجرم الحقيقي! قتلت كريم بدون قصد أثناء مشادة. دورك: حاول تضليل الآخرين ولا تفضح نفسك."; } else if(secretRole === 'غريب') { displayDesc += `\n\n🟡 أنت غريب عن القضية. مهمتك السرية: ${gameState.strangerMission} لا تخبر أحداً بمهمتك.`; } else { displayDesc += "\n\n🟢 أنت محقق عادي. دورك: اكتشف المجرم من خلال الأدلة والحوار مع الآخرين."; } document.getElementById('roleTitle').innerHTML = displayTitle; document.getElementById('roleDesc').innerHTML = displayDesc.replace(/\n/g, '<br>'); let flipBox = document.getElementById('flipCardContainer'); flipBox.classList.remove('flipped'); flipBox.onclick = () => { flipBox.classList.add('flipped'); }; document.getElementById('nextPlayerBtn').onclick = () => { gameState.currentRevealIdx++; updateRevealScreen(gameState.currentRevealIdx); }; }
        function showCasePopup() { let caseImg = casesData[0].img; let caseDesc = "القضية: استأجر أربعة طلاب شقة في التجمع للمذاكرة، لكن يومًا ما تحولت الشقة إلى مسرح جريمة بعد العثور على كريم ميتًا داخل الصالة. ومع تضارب الشهادات وظهور أدلة جديدة، أصبح كشف الحقيقة مهمة صعبة. هل تستطيع معرفة ما حدث؟ \n\n كل واحد منكم عنده شخصية مختلفة ودور في التحقيق. ابدأوا بسماع الأدلة وافتحوا تحقيق بينكم."; let popup = document.createElement('div'); popup.className = 'overlay'; popup.innerHTML = `<div class="case-popup"><img src="${caseImg}" alt="غلاف القضية"><p>${caseDesc}</p><button id="startGameBtn">اللي بعده</button></div>`; document.body.appendChild(popup); document.getElementById('startGameBtn').onclick = () => { popup.remove(); showGameplayAndStartCountdown(); }; }
